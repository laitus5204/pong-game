<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="score">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>
        
        <div class="game-container">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
        </div>
        
        <div class="controls">
            <p>Controls: Use <strong>Mouse Y</strong> or <strong>Arrow Keys (Up/Down)</strong> to move the left paddle</p>
            <p id="gameStatus">Press SPACE to start</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
